<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вайтлист | FoggyLand</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #006400 0%, #90EE90 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1e2a1f;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #006400, #32CD32);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            text-align: center;
            color: #2c5e2c;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1f3b1f;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #c0e0b0;
            border-radius: 1rem;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #32CD32;
            box-shadow: 0 0 0 3px rgba(50,205,50,0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #006400, #32CD32);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(0.98);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .info {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #4a6e4a;
            border-top: 1px solid #c0e0b0;
            padding-top: 1rem;
        }

        .success {
            background: #e0ffe0;
            border: 2px solid #32CD32;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            margin-top: 1rem;
            color: #1f4f1f;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 550px) {
            .form-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <h1>🌫️ FoggyLand</h1>
        <div class="sub">Подача заявки на вайтлист</div>

        <form id="whitelistForm" action="https://formspree.io/f/mzdjnqok" method="POST">
            <div class="form-group">
                <label>📝 Как к вам обращаться?</label>
                <input type="text" name="name" placeholder="Ваше имя" required>
            </div>

            <div class="form-group">
                <label>🎮 Ваш ник в Minecraft</label>
                <input type="text" name="minecraft_nick" placeholder="Никнейм" required>
            </div>

            <div class="form-group">
                <label>📱 Ваш Telegram (ник)</label>
                <input type="text" name="telegram" placeholder="@username или номер" required>
            </div>

            <div class="form-group">
                <label>💬 Почему хотите присоединиться? (необязательно)</label>
                <textarea name="message" placeholder="Напишите пару слов о себе..."></textarea>
            </div>

            <button type="submit">🚀 Отправить заявку</button>
        </form>

        <div id="successMessage" class="success hidden">
            ✅ Заявка отправлена!<br>
            Администратор свяжется с вами в Telegram.
        </div>

        <div class="info">
            🔒 После проверки заявки вы будете добавлены в вайтлист.<br>
            📩 Вам придёт уведомление в Telegram.
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('whitelistForm');
    const successDiv = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        
        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
            
            if (response.ok) {
                form.classList.add('hidden');
                successDiv.classList.remove('hidden');
                form.reset();
            } else {
                alert('Ошибка отправки. Попробуйте позже.');
            }
        } catch (error) {
            alert('Ошибка сети. Проверьте подключение.');
        }
    });
</script>
</body>
</html>
